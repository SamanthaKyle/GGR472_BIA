<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Adventure</title>

    <!-- Mapbox GL JS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js"></script>
    
    <!-- Mapbox Geocoder -->
    <link rel="stylesheet"
        href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.css"
        type="text/css">
    <script
        src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.min.js"></script>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
        <!-- Link to CSS File -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- MAP CONTAINER -->
    <div id='my-map' class='map-container'></div>

    <!-- NAVIGATION ELEMENTS -->
    <div class='map-search-container'>
        <label for="geocoder">Search for location</label>
        <div id="geocoder" class="geocoder"></div>
        <button type="button" class="btn btn-primary btn-sm" id="returnbutton">Return to full extent</button>
    </div>

    <!-- SCROLL AREA -->
    <div class="scroll-area"></div>
        <div class="card-wrapper">
            <ul class="card-list">
                <li class="card-item">
                    <a href="#" class="card-link">
                        <img src = "..." alt="Card Image"
                        class="card-image">
                        <p class="badge">Card Title 1</p>
                        <h2 class="card-title">Card Title 2</h2>
                        <button class="card-button material-symbols-rounded">Arrow_forward</button>
                    </a>
            </ul>
        </div>
        </div>

    <!-- Load the mapbox-gl-geocoder plugin. -->
    <script
        src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet"
        href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.css"
        type="text/css">


    <script src="script.js"></script>

    <!-- SWITCH REFERENCE TO ALTERNATIVE JS SOURCE WHEN READY TO EXPLORE EVENTS -->
    <!-- <script src="script-events-adv.js"></script> -->
    <!-- <script src="script-events-adv.js"></script> -->

</body>

</html>
